<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчёт по доходу</title>
</head>
<body>
    <h1>Отчёт по доходу специалистов</h1>

    <form method="get">
        <label>Специалист:
            <select name="specialist">
                <option value="">Все</option>
                {% for s in specialists %}
                <option value="{{ s.id }}" {% if selected_specialist_id == s.id|stringformat:"s" %}selected{% endif %}>
                    {{ s.full_name }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label>С: <input type="date" name="date_from" value="{{ date_from }}"></label>
        <label>По: <input type="date" name="date_to" value="{{ date_to }}"></label>

        <button type="submit">Показать</button>
        <button type="submit" name="download" value="1">Скачать Excel</button>
    </form>

    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Специалист</th>
                <th>Клиент</th>
                <th>Услуга</th>
                <th>Цена</th>
            </tr>
        </thead>
        <tbody>
            {% for appt in appointments %}
            <tr>
                <td>{{ appt.date }}</td>
                <td>{{ appt.specialist.full_name }}</td>
                <td>{{ appt.client.full_name }}</td>
                <td>{{ appt.service.name }}</td>
                <td>{{ appt.service.price }} руб.</td>
            </tr>
            {% empty %}
            <tr><td colspan="5">Нет данных</td></tr>
            {% endfor %}
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4"><strong>Итого:</strong></td>
                <td><strong>{{ total }} руб.</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
