{% extends "admin/base_site.html" %}
{% block content %}
<h1>Управление секциями главной страницы</h1>
<p class="help">Отметьте нужные секции и перетащите их для изменения порядка.</p>

<form method="post" id="sections-form">
    {% csrf_token %}
    <div id="sections-list" style="max-width: 600px;">
        {% for section in sections %}
        <div class="section-item" data-key="{{ section.key }}"
             style="display:flex; align-items:center; gap:12px; padding:12px 16px;
                    margin-bottom:8px; background:#fff; border:1px solid #ddd;
                    border-radius:6px; cursor:grab;">
            <span style="color:#aaa; font-size:18px;">☰</span>
            <input type="hidden" name="keys" value="{{ section.key }}">
            <input type="checkbox" name="enabled_{{ section.key }}"
                   id="enabled_{{ section.key }}"
                   {% if section.enabled %}checked{% endif %}
                   style="width:18px; height:18px;">
            <label for="enabled_{{ section.key }}" style="flex:1; margin:0; cursor:pointer;">
                <strong>{{ section.label }}</strong>
                <span style="color:#aaa; font-size:12px; margin-left:8px;">
                    {% if section.type == 'live' %}живые данные{% else %}ручной ввод{% endif %}
                </span>
            </label>
        </div>
        {% endfor %}
    </div>

    <div style="margin-top:20px;">
        <button type="submit" class="button default">Сохранить порядок и видимость</button>
        <a href="{% url 'admin:site_constructor_sitesettings_change' 1 %}"
           class="button" style="margin-left:8px;">Назад к настройкам</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
new Sortable(document.getElementById('sections-list'), {
    animation: 150,
    handle: '.section-item',
    ghostClass: 'sortable-ghost',
});
</script>
<style>
.sortable-ghost { opacity: 0.4; background: #f0f0f0; }
</style>
{% endblock %}
