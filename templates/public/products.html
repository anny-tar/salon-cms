{% extends 'base.html' %}
{% block content %}
<section class="py-5">
    <div class="container">
        <h2 class="mb-4">Товары</h2>
        <div class="row g-3">
            {% for product in products %}
            <div class="col-md-3">
                <div class="card h-100 shadow-sm">
                    {% if product.photo %}
                    <img src="{{ product.photo.url }}" class="card-img-top"
                         style="height:200px;object-fit:cover;">
                    {% endif %}
                    <div class="card-body">
                        <h6 class="card-title">{{ product.name }}</h6>
                        <p class="text-muted small">{{ product.description }}</p>
                        <p class="fw-bold mb-0">{{ product.price }} руб.</p>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="text-muted">Товаров пока нет</p>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
